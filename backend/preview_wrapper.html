<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Preview - {{ business_name }}</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: #000; }
        .bar { 
            min-height: 70px; 
            background: #111; 
            color: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 32px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        .brand strong { font-size: 20px; color: #6e8efb; }
        .bar-actions { display: flex; gap: 12px; }
        .btn { 
            padding: 10px 20px; 
            border-radius: 40px; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 14px; 
            background: #6e8efb; 
            color: #fff; 
            transition: all 0.3s ease;
        }
        .btn:hover { background: #5a7be2; transform: translateY(-1px); }
        iframe { width: 100%; height: calc(100vh - 70px); border: none; }
    </style>
</head>
<body>
    <div class="bar">
        <div class="brand"><strong>{{ business_name }}</strong></div>
        <div class="bar-actions">
            <a href="{{ view_source_url }}" class="btn">View Source</a>
        </div>
    </div>
    <iframe src="demo/index.html"></iframe>
</body>
</html>
